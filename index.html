<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>कर्मचारी नोंदणी - AI Training</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 650px;
            height: 90vh;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 15px;
            text-align: center;
            background: #1e293b;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin: 0; font-size: 1.3rem; color: #ffffff; }
        p { margin: 5px 0 0 0; font-size: 0.9rem; color: #94a3b8; }
        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>कर्मचारी नोंदणी (Registration)</h2>
            <p>कृपया खालील माहिती अचूक भरा. सबमिट केल्यानंतर प्रशिक्षण सुरू होईल.</p>
        </div>
        
        <iframe 
            id="googleFormIframe" 
            src="https://docs.google.com/forms/d/e/1FAIpQLSeqiUNoiCzMWxem2cd0gAvjUVuj0idfd_TIRuhrJi8KSKSvVA/viewform?usp=header?embedded=true" 
            onload="handleFormRedirect()">
            लोड होत आहे...
        </iframe>
    </div>

    <script>
        let loadCount = 0;

        function handleFormRedirect() {
            loadCount++;
            
            if (loadCount > 1) {
                // 1. Instantly launch the main training presentation file
                window.open(
                    "AI Training MarathiV4.html", 
                    "AITrainingWindow", 
                    "popup=yes,width=1280,height=720,left=100,top=100,resizable=yes,scrollbars=yes"
                );
                
                // 2. CODE TRICK: Clear out the index layout context and force a hard self-close
                window.location.href = "about:blank";
                window.close();
            }
        }
    </script>
</body>
</html>
